<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>とくにく | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --text: #e8e8e8;
            --accent: #d4af37; /* ゴールド */
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans JP', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        header {
            height: 100vh;
            min-height: 650px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), #1a1a1a;
        }
        
        .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            margin: 25px 0 10px;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 1.35rem;
            opacity: 0.85;
            max-width: 520px;
            margin: 0 auto;
        }
        
        .gallery {
            max-width: 1400px;
            margin: 80px auto;
            padding: 0 40px;
        }
        
        h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 60px;
            color: var(--accent);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 35px;
        }
        
        .artwork {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: all 0.4s ease;
        }
        
        .artwork:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(212, 175, 55, 0.15);
        }
        
        .artwork img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }
        
        .artwork:hover img {
            transform: scale(1.04);
        }
        
        .info {
            padding: 20px 24px;
            font-size: 1.05rem;
        }
        
        .info strong {
            display: block;
            margin-bottom: 6px;
            color: #f0f0f0;
        }
        
        .date {
            color: #888;
            font-size: 0.9rem;
        }
        
        footer {
            text-align: center;
            padding: 80px 20px 40px;
            color: #666;
            font-size: 0.95rem;
        }
        
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15,15,15,0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 18px 0;
            text-align: center;
        }
        
        .nav a {
            color: #ccc;
            margin: 0 25px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="#gallery">作品</a>
        <a href="https://x.com/specialmeat12" target="_blank">X</a>
    </nav>

    <header>
        <div>
            <img src="https://pbs.twimg.com/profile_images/2029925448516521984/bdIpkE4q.jpg" alt="とくにく" class="avatar">
            <h1>とくにく</h1>
            <p class="subtitle">落書きとイラスト<br>静かに、丁寧に。</p>
        </div>
    </header>

    <section id="gallery" class="gallery">
        <h2>Selected Works</h2>
        <div class="grid" id="art-grid">
            <!-- 作品はここに自動追加されます -->
        </div>
    </section>

    <footer>
        © 2026 とくにく (@specialmeat12)<br>
        All Rights Reserved. No unauthorized reproduction.
    </footer>

    <script>
        const artworks = [
            { img: "https://pbs.twimg.com/media/HFc4b7VbsAAZmRR.jpg", title: "#Liella応援", date: "2026.04" },
            { img: "https://pbs.twimg.com/media/HE6h-eybcAAF3JM.jpg", title: "落書き　デレの川島瑞樹ちゃん", date: "2026.04" },
            { img: "https://pbs.twimg.com/media/HEV-TPFbYAcTQ1M.jpg", title: "前髪がしっくりこなかった日の澁谷", date: "2026.03" },
            // ここに新しい作品を追加（カンマを忘れずに）
        ];

        const grid = document.getElementById('art-grid');
        artworks.forEach(art => {
            const div = document.createElement('div');
            div.className = 'artwork';
            div.innerHTML = `
                <img src="${art.img}" alt="${art.title}" loading="lazy">
                <div class="info">
                    <strong>${art.title}</strong>
                    <span class="date">${art.date}</span>
                </div>
            `;
            grid.appendChild(div);
        });
    </script>
</body>
</html>
